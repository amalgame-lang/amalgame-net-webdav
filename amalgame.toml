[package]
name              = "amalgame-net-webdav"
version           = "0.6.1"
license           = "Apache-2.0"
description       = "WebDAV server for the Mosaic stack — expose a filesystem directory over HTTP (the Apache mod_dav slice). v0.6.1: <oc:size> on synthetic collection listings (NAS root, /all, group roots) + Coll takes a size + DirSizeGet public, so the multi-user /all and /groups views (and the current-folder header) report folder weight too. v0.6.0: directory size cache — cumulative byte size per folder kept in a `user.amdav.size` xattr, updated live by the write verbs (PUT/DELETE/MKCOL/MOVE/COPY propagate the delta to ancestor dirs) and emitted as <oc:size> in PROPFIND so clients show folder weight without walking the tree. WebDav.ScanSizes(dir) recomputes a whole subtree (seed + periodic reconcile against drift). v0.5.1: fix PROPFIND displayname — v0.5.0 derived it from the (percent-encoded) href, showing 'Priv%C3%A9' instead of 'Privé'; now derived from the decoded Prefix+rel path (still the full path, so a space root reports 'home' not '/'). v0.5.0: (1) streaming PUT — when the H1 parser spools a large request body to disk (amalgame-net-http ≥ v0.28.0, HttpRequest.BodyFile set), DoPut moves the temp file into place with an atomic rename (same volume) instead of buffering, so multi-hundred-MB uploads run at ~64 KiB RAM; (2) PROPFIND displayname now derives from the full href, so a mounted space root (e.g. /home/) reports its real name ('home') instead of '/' — fixes empty/slash breadcrumb segments in WebDAV file managers. v0.4.2: percent-encode <D:href> paths (RFC 3986) so names with '#'/'?' aren't truncated client-side. Class 1 read/write (OPTIONS, PROPFIND, GET, HEAD, PUT, DELETE, MKCOL, COPY, MOVE) plus opt-in Class 2 locking (LOCK / UNLOCK). v0.3.0 adds WebDavNas — a multi-user NAS layer (per-user /home + a common /shared, one HTTP-Basic login each), with authentication delegated to the dedicated amalgame-auth package (WebDav itself is auth-agnostic). v0.4.0 adds an admin role (AddAdmin): admins reach every user's home read/write under /all/<user> (e.g. parents over children), hidden 404 from non-admins. Works with Android WebDAV apps / Finder / Windows / davfs2 / rclone; deploy behind the Mosaic HTTPS host. Binary-safe GET (net-http File mode) and PUT (raw body buffer). Security: operator-fixed root, path traversal blocked (403), per-user isolation, auth fails closed (401). Directory enumeration via amalgame-io-filesystem; the handler is a pure HttpRequest -> HttpResponse dispatch."
required-amalgame = ">=0.8.72"
schema-version    = 1

[dependencies]
amalgame-net-http       = ">=0.28.0"
amalgame-io-filesystem  = ">=0.2.0"
amalgame-datetime       = ">=0.2.2"
amalgame-auth           = ">=0.1.0"
amalgame-formats-xml    = ">=0.1.0"

[stdlib]
classes   = ["WebDav", "DavLock", "DavLockStore", "WebDavNas"]
header    = "facade-stub.h"
namespace = "Amalgame.Net.WebDav"
facade    = "facade.am"
libs      = []
