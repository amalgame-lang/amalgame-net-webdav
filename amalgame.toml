[package]
name              = "amalgame-net-webdav"
version           = "0.4.1"
license           = "Apache-2.0"
description       = "WebDAV server for the Mosaic stack — expose a filesystem directory over HTTP (the Apache mod_dav slice). Class 1 read/write (OPTIONS, PROPFIND, GET, HEAD, PUT, DELETE, MKCOL, COPY, MOVE) plus opt-in Class 2 locking (LOCK / UNLOCK). v0.3.0 adds WebDavNas — a multi-user NAS layer (per-user /home + a common /shared, one HTTP-Basic login each), with authentication delegated to the dedicated amalgame-auth package (WebDav itself is auth-agnostic). v0.4.0 adds an admin role (AddAdmin): admins reach every user's home read/write under /all/<user> (e.g. parents over children), hidden 404 from non-admins. Works with Android WebDAV apps / Finder / Windows / davfs2 / rclone; deploy behind the Mosaic HTTPS host. Binary-safe GET (net-http File mode) and PUT (raw body buffer). Security: operator-fixed root, path traversal blocked (403), per-user isolation, auth fails closed (401). Directory enumeration via amalgame-io-filesystem; the handler is a pure HttpRequest -> HttpResponse dispatch."
required-amalgame = ">=0.8.72"
schema-version    = 1

[dependencies]
amalgame-net-http       = ">=0.16.0"
amalgame-io-filesystem  = ">=0.2.0"
amalgame-datetime       = ">=0.2.2"
amalgame-auth           = ">=0.1.0"

[stdlib]
classes   = ["WebDav", "DavLock", "DavLockStore", "WebDavNas"]
header    = "facade-stub.h"
namespace = "Amalgame.Net.WebDav"
facade    = "facade.am"
libs      = []
